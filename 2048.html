<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="description" content="2048 — a small game on Shuta Tsuchio's site. 2048（土尾崇太の好きなゲーム）。">
<title>2048 — Shuta Tsuchio</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  /* ---- 2048 game-specific styles ---- */
  .sub { color: var(--muted); font-size: 14px; margin: 16px 0 6px; }

  .topbar {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px; margin: 22px 0 18px; flex-wrap: wrap;
  }
  .scores { display: flex; gap: 12px; }
  .score-box { background: #efeee9; border-radius: 6px; padding: 8px 16px; text-align: center; min-width: 84px; }
  .score-box .label { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  .score-box .value { font-size: 22px; font-weight: bold; line-height: 1.2; }

  button.new { font-family: inherit; font-size: 14px; color: var(--bg); background: var(--accent);
    border: none; border-radius: 6px; padding: 10px 18px; cursor: pointer; }
  button.new:hover { opacity: .85; }
  button.new:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  .stage { position: relative; }
  .board { position: relative; background: #efeee9; border-radius: 10px; padding: var(--gap);
    width: 100%; aspect-ratio: 1 / 1; touch-action: none; --gap: 12px; }
  .grid { position: absolute; inset: var(--gap); display: grid;
    grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: var(--gap); }
  .grid .cell { background: #e3e1d8; border-radius: 6px; }
  .tiles { position: absolute; inset: var(--gap); }
  .tile { position: absolute; display: flex; align-items: center; justify-content: center;
    border-radius: 6px; font-weight: bold; font-variant-numeric: tabular-nums;
    transition: transform .12s ease; will-change: transform; }
  .tile.new { animation: pop .16s ease; }
  .tile.merged { animation: bump .16s ease; }
  @keyframes pop { from { transform: scale(0);} to { transform: scale(1);} }
  @keyframes bump { 0%{transform:scale(1);} 50%{transform:scale(1.12);} 100%{transform:scale(1);} }

  .t2{background:#eee9dd;color:#5b574c;} .t4{background:#ece2c8;color:#5b574c;}
  .t8{background:#e3b07a;color:#fff;} .t16{background:#dd9460;color:#fff;}
  .t32{background:#d97a55;color:#fff;} .t64{background:#d35f3c;color:#fff;}
  .t128{background:#c9a23a;color:#fff;} .t256{background:#c79a28;color:#fff;}
  .t512{background:#c08f1d;color:#fff;} .t1024{background:#9c8b3b;color:#fff;}
  .t2048{background:#3f4a3a;color:#fff;} .tbig{background:#222;color:#fff;}

  .overlay { position: absolute; inset: 0; background: rgba(255,255,255,.8); border-radius: 10px;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; text-align: center; z-index: 5; }
  .overlay.show { display: flex; }
  .overlay .msg { font-size: 28px; font-weight: bold; font-style: italic; }
  .overlay .actions { display: flex; gap: 10px; }
  .overlay button { font-family: inherit; font-size: 14px; cursor: pointer; border-radius: 6px;
    padding: 9px 16px; border: 1px solid var(--ink); background: var(--bg); color: var(--ink); }
  .overlay button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .overlay button:hover { opacity: .85; }

  .hint { margin-top: 18px; color: var(--muted); font-size: 13px; }

  @media (max-width: 480px) {
    .board { --gap: 9px; }
    .score-box { min-width: 72px; padding: 6px 12px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .tile { transition: none; } .tile.new, .tile.merged { animation: none; }
  }
</style>
</head>
<body>

<h1><em>2048</em>
  <span class="role">土尾 崇太の好きなゲーム ・ A small game</span>
</h1>

<nav>
  <a href="index.html">Home</a>
  <a href="publications.html">Publications</a>
  <a href="2048.html" aria-current="page">2048</a>
  <a href="contact.html">Contact</a>
</nav>

<p class="sub">矢印キー / WASD、またはスワイプで操作。 ・ Arrow keys / WASD, or swipe.</p>

<div class="topbar">
  <div class="scores">
    <div class="score-box"><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div class="score-box"><div class="label">Best</div><div class="value" id="best">0</div></div>
  </div>
  <button class="new" id="newGame">New Game</button>
</div>

<div class="stage">
  <div class="board" id="board">
    <div class="grid" id="grid"></div>
    <div class="tiles" id="tiles"></div>
    <div class="overlay" id="overlay">
      <div class="msg" id="overlayMsg">Game Over</div>
      <div class="actions">
        <button class="primary" id="overlayPrimary">New Game</button>
        <button id="overlayKeep" style="display:none">Keep going</button>
      </div>
    </div>
  </div>
</div>

<p class="hint">同じ数字を合わせて 2048 を目指そう。 ・ Combine matching numbers to reach 2048.</p>

<footer>&copy; Shuta Tsuchio</footer>

<script>
(() => {
  const SIZE = 4;
  const gridEl = document.getElementById('grid');
  const tilesEl = document.getElementById('tiles');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const boardEl = document.getElementById('board');
  const overlay = document.getElementById('overlay');
  const overlayMsg = document.getElementById('overlayMsg');
  const overlayPrimary = document.getElementById('overlayPrimary');
  const overlayKeep = document.getElementById('overlayKeep');

  const store = {
    get(k){ try { return localStorage.getItem(k); } catch(e){ return null; } },
    set(k,v){ try { localStorage.setItem(k,v); } catch(e){} }
  };

  let cells = [];
  let nextId = 1;
  let score = 0;
  let best = parseInt(store.get('best2048') || '0', 10) || 0;
  let won = false;
  let busy = false;
  bestEl.textContent = best;

  for (let i = 0; i < SIZE * SIZE; i++) {
    const c = document.createElement('div');
    c.className = 'cell';
    gridEl.appendChild(c);
  }

  const idx = (r, c) => r * SIZE + c;
  const cellClass = (v) => v >= 4096 ? 'tbig' : 't' + v;

  function fontFrac(v) {
    const len = String(v).length;
    if (len <= 2) return 0.46;
    if (len === 3) return 0.38;
    if (len === 4) return 0.30;
    return 0.24;
  }

  function metrics() {
    const gap = parseFloat(getComputedStyle(boardEl).getPropertyValue('--gap'));
    const inner = tilesEl.clientWidth;
    const size = (inner - gap * (SIZE - 1)) / SIZE;
    return { gap, size };
  }

  function render(spawns, merges) {
    tilesEl.innerHTML = '';
    const { gap, size } = metrics();
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const cell = cells[idx(r, c)];
        if (!cell) continue;
        const x = c * (size + gap);
        const y = r * (size + gap);
        const t = document.createElement('div');
        t.className = 'tile ' + cellClass(cell.value);
        if (spawns && spawns.has(cell.id)) t.classList.add('new');
        if (merges && merges.has(cell.id)) t.classList.add('merged');
        t.style.width = size + 'px';
        t.style.height = size + 'px';
        t.style.transform = `translate(${x}px, ${y}px)`;
        t.style.fontSize = (size * fontFrac(cell.value)) + 'px';
        const span = document.createElement('span');
        span.textContent = cell.value;
        t.appendChild(span);
        tilesEl.appendChild(t);
      }
    }
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; store.set('best2048', best); }
  }

  function emptyCells() {
    const out = [];
    for (let i = 0; i < cells.length; i++) if (!cells[i]) out.push(i);
    return out;
  }

  function addRandom() {
    const empties = emptyCells();
    if (!empties.length) return null;
    const i = empties[Math.floor(Math.random() * empties.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    const id = nextId++;
    cells[i] = { value, id };
    return id;
  }

  function reset() {
    cells = new Array(SIZE * SIZE).fill(null);
    score = 0; won = false; nextId = 1;
    overlay.classList.remove('show');
    overlayKeep.style.display = 'none';
    const spawns = new Set();
    spawns.add(addRandom());
    spawns.add(addRandom());
    render(spawns, null);
  }

  function move(dir) {
    if (busy) return;
    const merges = new Set();
    let moved = false, gained = 0;
    const lines = [];
    for (let i = 0; i < SIZE; i++) {
      const line = [];
      for (let j = 0; j < SIZE; j++) {
        let r, c;
        if (dir === 'left')  { r = i; c = j; }
        if (dir === 'right') { r = i; c = SIZE - 1 - j; }
        if (dir === 'up')    { r = j; c = i; }
        if (dir === 'down')  { r = SIZE - 1 - j; c = i; }
        line.push({ r, c });
      }
      lines.push(line);
    }
    for (const line of lines) {
      const vals = line.map(p => cells[idx(p.r, p.c)]).filter(Boolean);
      const merged = [];
      for (let k = 0; k < vals.length; k++) {
        if (k + 1 < vals.length && vals[k].value === vals[k + 1].value) {
          const newVal = vals[k].value * 2;
          merged.push({ value: newVal, id: vals[k].id });
          merges.add(vals[k].id);
          gained += newVal;
          if (newVal === 2048 && !won) won = true;
          k++;
        } else {
          merged.push(vals[k]);
        }
      }
      for (let k = 0; k < SIZE; k++) {
        const p = line[k];
        const newCell = merged[k] || null;
        const oldCell = cells[idx(p.r, p.c)];
        if ((oldCell && newCell && (oldCell.id !== newCell.id || oldCell.value !== newCell.value)) ||
            (!oldCell && newCell) || (oldCell && !newCell)) moved = true;
        cells[idx(p.r, p.c)] = newCell;
      }
    }
    if (!moved) return;
    score += gained;
    busy = true;
    render(null, merges);
    setTimeout(() => {
      const newId = addRandom();
      const spawns = new Set();
      if (newId) spawns.add(newId);
      render(spawns, null);
      busy = false;
      checkEnd();
    }, 120);
    if (won && overlayKeep.style.display === 'none' && !overlay.classList.contains('show')) {
      overlayMsg.textContent = 'You win!';
      overlayPrimary.textContent = 'New Game';
      overlayKeep.style.display = 'inline-block';
      overlay.classList.add('show');
    }
  }

  function canMove() {
    if (emptyCells().length) return true;
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const v = cells[idx(r, c)].value;
        if (c + 1 < SIZE && cells[idx(r, c + 1)].value === v) return true;
        if (r + 1 < SIZE && cells[idx(r + 1, c)].value === v) return true;
      }
    }
    return false;
  }

  function checkEnd() {
    if (!canMove()) {
      overlayMsg.textContent = 'Game Over';
      overlayPrimary.textContent = 'Try Again';
      overlayKeep.style.display = 'none';
      overlay.classList.add('show');
    }
  }

  const keyMap = {
    ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
    a:'left', d:'right', w:'up', s:'down', h:'left', l:'right', k:'up', j:'down'
  };
  window.addEventListener('keydown', (e) => {
    const dir = keyMap[e.key];
    if (!dir) return;
    e.preventDefault();
    move(dir);
  }, { passive: false });

  let startX = 0, startY = 0, tracking = false;
  boardEl.addEventListener('touchstart', (e) => {
    const t = e.touches[0]; startX = t.clientX; startY = t.clientY; tracking = true;
  }, { passive: true });
  boardEl.addEventListener('touchmove', (e) => { if (tracking) e.preventDefault(); }, { passive: false });
  boardEl.addEventListener('touchend', (e) => {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX, dy = t.clientY - startY;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < 24) return;
    if (ax > ay) move(dx > 0 ? 'right' : 'left');
    else move(dy > 0 ? 'down' : 'up');
  }, { passive: true });

  document.getElementById('newGame').addEventListener('click', reset);
  overlayPrimary.addEventListener('click', reset);
  overlayKeep.addEventListener('click', () => overlay.classList.remove('show'));
  window.addEventListener('resize', () => render(null, null));

  reset();
})();
</script>

</body>
</html>
